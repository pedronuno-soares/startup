<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Incorrupt — Terminal OS</title>
<link rel="stylesheet" href="/public/theme.css">
<style>
  .terminal-wrapper {
    background: #050505;
    border: 1px solid var(--brd);
    border-radius: 8px;
    padding: 20px;
    height: calc(100vh - 120px);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.05);
  }
  .terminal-output {
    flex: 1;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #00ff41;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
    padding-bottom: 20px;
  }
  .terminal-input-line {
    display: flex;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #00ff41;
    margin-top: 10px;
  }
  .terminal-prompt {
    margin-right: 10px;
    font-weight: bold;
  }
  .terminal-input {
    background: transparent;
    border: none;
    color: #00ff41;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    flex: 1;
    outline: none;
    caret-color: #00ff41;
  }
  .terminal-output span.sys { color: #f39c12; }
  .terminal-output span.err { color: #e74c3c; }
  .terminal-output span.info { color: #3498db; }
  .terminal-output span.sec { color: #9b59b6; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand">
    <div class="brand-inner">
      <div class="logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
      <h1>Incorrupt</h1>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="Modo Claro/Escuro">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>

  <div class="nav-lbl">Dashboard</div>
  <div class="nav">
    <a href="/" class="nav-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Upload</a>
    <a href="/explorer" class="nav-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg> Blockchain</a>
  </div>

  <div class="nav-lbl">Forense</div>
  <div class="nav">
    <a href="/verify" class="nav-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Verificar Prova</a>
    <a href="/analyse" class="nav-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Análise Prévia</a>
    <a href="/custody" class="nav-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M15 14l-3 3-3-3"/><path d="M12 17V9"/></svg> Gestão de Custódia</a>
    <a href="/terminal" class="nav-btn active" style="color:#00ff41; background:rgba(0,255,65,0.1); border-color:rgba(0,255,65,0.3)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg> Terminal OS</a>
    <a href="/chaos" class="nav-btn" style="color:#ff4444;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Simulador de Ataque</a>
  </div>

  <div class="sb-footer spotlight">
    <div class="user-badge" id="userBadge" style="display:none"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> <span id="userBadgeText"></span></div>
    <div class="badge off" id="serverBadge"><div class="dot"></div> <span id="serverStatus">A carregar...</span></div>
    <button class="btn-logout" onclick="doLogout()">Terminar Sessão</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <h2>Terminal Forense (Threat Hunting)</h2>
    <div class="bft-tag">NTP SECURE SHELL</div>
  </div>

  <div class="terminal-wrapper">
    <div class="terminal-output" id="terminalOutput">
      <div><span class="sys">INCORRUPT OS v1.0.4 - BFT NODE SECURE SHELL</span></div>
      <div>Type '<span class="info">help</span>' for available commands.</div>
      <br>
    </div>
    <div class="terminal-input-line">
      <span class="terminal-prompt">root@dems-node-1:~#</span>
      <input type="text" class="terminal-input" id="terminalInput" autocomplete="off" spellcheck="false" autofocus>
    </div>
  </div>
</main>

<div id="toast-container"></div>
<script src="/public/app.js"></script>
<script>
  const output = document.getElementById('terminalOutput');
  const input = document.getElementById('terminalInput');
  
  let blockchainData = [];
  
  async function fetchBlockchainData() {
    try {
      const res = await fetch('/api/v1/chain/blocks', {
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('dems_token') }
      });
      const data = await res.json();
      if (data && data.blocks) blockchainData = data.blocks;
    } catch (e) {
      printLine('<span class="err">SYS ERROR: Could not connect to blockchain nodes.</span>');
    }
  }

  function printLine(htmlText, speed = 5) {
    return new Promise(resolve => {
      const div = document.createElement('div');
      output.appendChild(div);
      
      // If we want typing effect, we can implement it. For now, instant render for HTML support is easier, 
      // but let's do a fast instant render since we use HTML spans for colors.
      div.innerHTML = htmlText;
      output.scrollTop = output.scrollHeight;
      setTimeout(resolve, speed);
    });
  }

  async function handleCommand(cmdStr) {
    const args = cmdStr.trim().split(' ').filter(x => x);
    if (args.length === 0) return;
    const cmd = args[0].toLowerCase();
    
    await printLine(`<span class="prompt">root@dems-node-1:~#</span> ${cmdStr}`);
    
    if (blockchainData.length === 0 && cmd !== 'clear') {
      await fetchBlockchainData();
    }

    switch(cmd) {
      case 'help':
        await printLine('AVAILABLE COMMANDS:');
        await printLine('  <span class="info">help</span>                 Show this menu');
        await printLine('  <span class="info">nodes</span>                Check BFT Node Status');
        await printLine('  <span class="info">whoami</span>               Display current active user');
        await printLine('  <span class="info">scan [filename]</span>      Dump full file characteristics and EXIF metadata');
        await printLine('  <span class="info">trace logs [hash]</span>    Pull the Audit Trail (who verified/accessed the file)');
        await printLine('  <span class="info">hashverify [hash]</span>    Simulate deep cryptographic block validation');
        await printLine('  <span class="info">matrix</span>               Run encryption cascade (visual effect)');
        await printLine('  <span class="info">clear</span>                Clear the terminal screen');
        break;
      
      case 'clear':
        output.innerHTML = '';
        break;
        
      case 'nodes':
        await printLine('<span class="sys">[*] Pinging BFT Audit Nodes...</span>', 200);
        await printLine('    <span class="sec">[OK] Node 1 (Primary)</span> - 12ms');
        await printLine('    <span class="sec">[OK] Node 2 (Replica)</span> - 14ms');
        await printLine('    <span class="sec">[OK] Node 3 (Replica)</span> - 11ms');
        await printLine('<span class="sys">[*] QUORUM: 3/3 ACHIEVABLE. SYSTEM SECURE.</span>');
        break;
        
      case 'whoami':
        const userRaw = localStorage.getItem('dems_user');
        if (userRaw) {
          const user = JSON.parse(userRaw);
          await printLine(`ACTIVE SESSION IDENTIFIER:`);
          await printLine(`  <span class="info">NAME:</span>  ${user.name}`);
          await printLine(`  <span class="info">EMAIL:</span> ${user.email}`);
          await printLine(`  <span class="info">ROLE:</span>  <span class="err">${user.role}</span>`);
        } else {
          await printLine('<span class="err">NO ACTIVE SESSION DETECTED.</span>');
        }
        break;
        
      case 'matrix':
        input.disabled = true;
        for(let i=0; i<30; i++) {
          let hex = '';
          for(let j=0; j<80; j++) hex += Math.floor(Math.random()*16).toString(16) + ' ';
          await printLine(`<span style="color:#0f0; opacity:${Math.random()}">${hex}</span>`, 10);
        }
        await printLine('<span class="sys">[*] DECRYPTION COMPLETE.</span>');
        input.disabled = false;
        break;
        
      case 'hashverify':
        if (!args[1]) {
          await printLine('<span class="err">Usage: hashverify [hash]</span>');
          break;
        }
        await printLine(`<span class="sys">[*] INITIATING CRYPTOGRAPHIC AUDIT FOR HASH: ${args[1]}</span>`, 300);
        await printLine(`    Fetching block data... <span class="sec">OK</span>`, 200);
        await printLine(`    Verifying SHA-256 signature against genesis block... <span class="sec">MATCH</span>`, 400);
        await printLine(`    Validating NTP Timestamps... <span class="sec">SECURE</span>`, 300);
        await printLine(`    Checking BFT Node signatures... <span class="sec">VERIFIED (3/3)</span>`, 300);
        await printLine(`<span class="sec">[+] BLOCK IS CHEMICALLY PURE AND UNTAMPERED.</span>`);
        break;
        
      case 'scan':
        const search = args.slice(1).join(' ').toLowerCase();
        if (!search) {
          await printLine('<span class="err">Usage: scan [filename]</span>');
          break;
        }
        await printLine(`<span class="sys">[*] Scanning matrix for '${search}'...</span>`, 300);
        
        const fileBlocks = blockchainData.filter(b => 
          b.action === 'EVIDENCE_UPLOAD' && b.fileName.toLowerCase().includes(search)
        );
        
        if (fileBlocks.length === 0) {
          await printLine(`<span class="err">[-] NO MATCH FOUND IN BFT CLUSTER.</span>`);
        } else {
          for (const b of fileBlocks) {
            await printLine(`<span class="sec">[+] EVIDENCE LOCK ACQUIRED</span>`);
            await printLine(`    FILE NAME:   <span class="info">${b.fileName}</span>`);
            await printLine(`    FILE HASH:   ${b.fileHash}`);
            await printLine(`    BLOCK HASH:  ${b.currentHash}`);
            await printLine(`    UPLOADER:    ${b.actorRole}`);
            await printLine(`    DATE:        ${new Date(b.timestamp).toISOString()}`);
            await printLine(`    CONSENSUS:   ${b.consensusCount}/3 NODES`);
            
            if (b.metadata && b.metadata !== 'NONE') {
              await printLine(`    <span class="err">[!] CLASSIFIED EXIF METADATA DETECTED:</span>`);
              const meta = JSON.parse(b.metadata);
              for (const key in meta) {
                await printLine(`        ${key.toUpperCase()}: ${meta[key]}`);
              }
              if (meta.latitude && meta.longitude) {
                await printLine(`        <span class="info">SATELLITE TRACKING:</span> <a href="https://www.google.com/maps?q=${meta.latitude},${meta.longitude}" target="_blank" style="color:var(--acc); text-decoration:underline;">[OPEN GOOGLE MAPS]</a>`);
              }
            } else {
              await printLine(`    <span class="sys">[*] NO EXIF METADATA FOUND.</span>`);
            }
            await printLine(' ');
          }
        }
        break;
        
      case 'trace':
        if (args[1] !== 'logs' || !args[2]) {
          await printLine('<span class="err">Usage: trace logs [fileHash]</span>');
          break;
        }
        const hash = args[2];
        await printLine(`<span class="sys">[*] Tracing ACCESS_LOGS for fileHash '${hash}'...</span>`, 300);
        
        const logs = blockchainData.filter(b => b.action === 'ACCESS_LOG:VERIFY' && b.fileHash === hash);
        
        if (logs.length === 0) {
          await printLine(`<span class="sys">[*] NO ACCESS/VERIFY LOGS FOUND FOR THIS FILE.</span>`);
        } else {
          await printLine(`<span class="sec">[+] AUDIT TRAIL RECOVERED:</span>`);
          logs.reverse().forEach(async (l, i) => {
            await printLine(`    [${i+1}] DATE: ${new Date(l.timestamp).toISOString()} | ACTOR: <span class="info">${l.actorRole}</span> | BFT: ${l.consensusCount}/3 | BLOCK: ${l.blockIndex}`);
          });
        }
        break;
        
      default:
        await printLine(`<span class="err">Command not found: ${cmd}. Type 'help' for available commands.</span>`);
    }
    
    // Add empty line after command
    await printLine('<br>');
    output.scrollTop = output.scrollHeight;
  }

  input.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter') {
      const val = input.value;
      input.value = '';
      input.disabled = true;
      await handleCommand(val);
      input.disabled = false;
      input.focus();
    }
  });

  // Focus input on click anywhere in terminal
  document.querySelector('.terminal-wrapper').addEventListener('click', () => {
    input.focus();
  });
</script>
</body>
</html>
